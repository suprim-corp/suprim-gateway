<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' — Kiro Gateway' : 'Kiro Gateway'}">Kiro Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'neon-purple': '#a78bfa',
                        'neon-cyan': '#22d3ee',
                        'neon-green': '#4ade80',
                        'neon-yellow': '#facc15',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace; }
    </style>
</head>
<body class="dark bg-zinc-950 text-zinc-100 min-h-screen flex">
    <th:block th:replace="~{fragments/sidebar :: sidebar}" />
    <main class="flex-1 ml-56 p-6">
        <th:block th:replace="${content}" />
    </main>
</body>
</html>
