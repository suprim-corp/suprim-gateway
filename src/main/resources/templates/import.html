<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<th:block th:fragment="content">
    <div class="space-y-6">
        <h1 class="text-lg font-semibold tracking-tight">Import Credentials</h1>

        <div th:if="${error}" class="border border-red-500/30 bg-red-500/10 p-4 rounded-lg">
            <p class="text-xs text-red-400" th:text="${error}"></p>
        </div>

        <div th:if="${success}" class="border border-green-500/30 bg-green-500/10 p-4 rounded-lg space-y-2">
            <p class="text-xs text-green-400">Import successful</p>
            <div class="text-xs text-zinc-300 space-y-1">
                <p>Profile ARN: <span class="text-zinc-100" th:text="${profileArn}"></span></p>
                <p>Auth Type: <span class="text-zinc-100" th:text="${authType}"></span></p>
                <p>New Account: <span class="text-zinc-100" th:text="${isNew}"></span></p>
            </div>
        </div>

        <div class="border border-zinc-800 bg-zinc-900/50 p-4 rounded-lg space-y-4">
            <div>
                <span class="text-[10px] uppercase tracking-widest text-zinc-500">Upload JSON Files</span>
                <p class="mt-1 text-xs text-zinc-400">Select 1-2 JSON files (token file with refreshToken, client file
                    with clientId)</p>
            </div>
            <form action="/auth/import" method="post" enctype="multipart/form-data" class="space-y-4">
                <input type="file" name="files" accept=".json" multiple
                       class="block w-full text-xs text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border file:border-zinc-700 file:text-xs file:font-medium file:bg-zinc-800 file:text-zinc-300 file:cursor-pointer hover:file:bg-zinc-700 transition-colors">
                <button type="submit"
                        class="h-9 px-4 bg-purple-600 hover:bg-purple-500 text-white rounded text-xs cursor-pointer transition-colors">
                    Import
                </button>
            </form>
        </div>
    </div>
</th:block>
</html>
