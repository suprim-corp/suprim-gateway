<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<th:block th:fragment="content">
    <div class="space-y-6">
        <div class="flex items-center justify-between">
            <h1 class="text-lg font-semibold tracking-tight">Logs</h1>
            <span class="text-[10px] text-zinc-500" th:text="${total + ' total'}">0 total</span>
        </div>

        <div class="border border-zinc-800 bg-zinc-900/50 rounded-lg overflow-hidden"
             hx-get="/logs" hx-trigger="every 3s" hx-select="#logs-table" hx-target="#logs-table" hx-swap="outerHTML">
            <div class="max-h-[calc(100vh-220px)] overflow-auto">
                <table id="logs-table" class="w-full text-xs">
                    <thead class="sticky top-0 bg-zinc-900 z-10">
                    <tr class="border-b border-zinc-800">
                        <th class="px-4 py-3 text-left text-[10px] uppercase tracking-widest text-zinc-500 font-normal">
                            Status
                        </th>
                        <th class="px-4 py-3 text-left text-[10px] uppercase tracking-widest text-zinc-500 font-normal">
                            Account
                        </th>
                        <th class="px-4 py-3 text-left text-[10px] uppercase tracking-widest text-zinc-500 font-normal">
                            Model
                        </th>
                        <th class="px-4 py-3 text-left text-[10px] uppercase tracking-widest text-zinc-500 font-normal">
                            In
                        </th>
                        <th class="px-4 py-3 text-left text-[10px] uppercase tracking-widest text-zinc-500 font-normal">
                            Out
                        </th>
                        <th class="px-4 py-3 text-left text-[10px] uppercase tracking-widest text-zinc-500 font-normal">
                            Cost
                        </th>
                        <th class="px-4 py-3 text-left text-[10px] uppercase tracking-widest text-zinc-500 font-normal">
                            Credits
                        </th>
                        <th class="px-4 py-3 text-left text-[10px] uppercase tracking-widest text-zinc-500 font-normal">
                            Time to First Token
                        </th>
                        <th class="px-4 py-3 text-left text-[10px] uppercase tracking-widest text-zinc-500 font-normal">
                            Duration
                        </th>
                        <th class="px-4 py-3 text-left text-[10px] uppercase tracking-widest text-zinc-500 font-normal">
                            Stream
                        </th>
                        <th class="px-4 py-3 text-left text-[10px] uppercase tracking-widest text-zinc-500 font-normal">
                            Key
                        </th>
                        <th class="px-4 py-3 text-left text-[10px] uppercase tracking-widest text-zinc-500 font-normal">
                            IP
                        </th>
                        <th class="px-4 py-3 text-left text-[10px] uppercase tracking-widest text-zinc-500 font-normal">
                            Time
                        </th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-zinc-800/50">
                    <tr th:if="${logs.isEmpty()}">
                        <td colspan="13" class="px-4 py-8 text-center text-xs text-zinc-500">No requests yet</td>
                    </tr>
                    <tr th:each="log : ${logs}" class="hover:bg-zinc-800/20 transition-colors">
                        <td class="px-4 py-2.5">
                            <span th:class="${log.status() < 300 ? 'text-neon-green' : (log.status() < 500 ? 'text-neon-yellow' : 'text-red-400')}"
                                  class="text-[10px] font-medium" th:text="${log.status()}">200</span>
                        </td>
                        <td class="px-4 py-2.5 text-[10px] text-zinc-500 max-w-[120px] truncate" th:text="${log.accountId() ?: '—'}" th:title="${log.accountId()}">—</td>
                        <td class="px-4 py-2.5 text-[10px]">
                            <div class="flex items-center gap-1.5">
                                <img th:if="${log.provider() == 'KIRO'}"
                                     src="https://raw.githubusercontent.com/lobehub/lobe-icons/refs/heads/master/packages/static-png/light/kiro-color.png"
                                     class="size-3.5">
                                <img th:if="${log.provider() == 'ANTIGRAVITY'}"
                                     src="https://raw.githubusercontent.com/lobehub/lobe-icons/refs/heads/master/packages/static-png/light/antigravity-color.png"
                                     class="size-3.5">
                                <img th:if="${log.provider() == 'XAI'}"
                                     src="https://raw.githubusercontent.com/lobehub/lobe-icons/refs/heads/master/packages/static-png/dark/xai.png"
                                     class="size-3.5">
                                <span th:text="${log.model()}">—</span>
                            </div>
                        </td>
                        <td class="px-4 py-2.5 text-[10px] text-zinc-500"
                            th:text="${log.usage().promptTokens() != null ? #numbers.formatInteger(log.usage().promptTokens(), 1, 'COMMA') : '—'}">
                            —
                        </td>
                        <td class="px-4 py-2.5 text-[10px] text-zinc-500"
                            th:text="${log.usage().completionTokens() != null ? #numbers.formatInteger(log.usage().completionTokens(), 1, 'COMMA') : '—'}">
                            —
                        </td>
                        <td class="px-4 py-2.5 text-[10px] text-neon-yellow"
                            th:text="${log.usage().cost() != null ? '$' + #numbers.formatDecimal(log.usage().cost(), 1, 6) : '—'}">
                            —
                        </td>
                        <td class="px-4 py-2.5 text-[10px] text-neon-cyan"
                            th:text="${log.credits() != null ? #numbers.formatDecimal(log.credits(), 1, 4) : '—'}">
                            —
                        </td>
                        <td class="px-4 py-2.5 text-[10px] text-zinc-500"
                            th:text="${log.firstTokenMs() != null ? #numbers.formatInteger(log.firstTokenMs(), 1, 'COMMA') + 'ms' : '—'}">—
                        </td>
                        <td class="px-4 py-2.5 text-[10px] text-zinc-500"
                            th:text="${log.latencyMs() != null ? #numbers.formatInteger(log.latencyMs(), 1, 'COMMA') + 'ms' : '—'}">—
                        </td>
                        <td class="px-4 py-2.5 text-[10px]">
                            <span th:if="${log.streaming() != null && log.streaming()}"
                                  class="text-neon-cyan">SSE</span>
                            <span th:if="${log.streaming() == null || !log.streaming()}"
                                  class="text-zinc-500">sync</span>
                        </td>
                        <td class="px-4 py-2.5 text-[10px] text-zinc-500" th:text="${log.keyName() ?: '—'}">—</td>
                        <td class="px-4 py-2.5 text-[10px] text-zinc-500" th:text="${log.clientIp() ?: '—'}">—</td>
                        <td class="px-4 py-2.5 text-[10px] text-zinc-500"
                            th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm')}">—
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <th:block th:if="${totalPages > 1}">
            <nav class="flex justify-center gap-1">
                <a th:if="${page > 1}" th:href="@{/logs(page=${page - 1})}"
                   class="px-3 py-1 text-xs border border-zinc-800 rounded hover:bg-zinc-800 cursor-pointer">Prev</a>
                <span class="px-3 py-1 text-xs text-zinc-500" th:text="'Page ' + ${page} + ' of ' + ${totalPages}">Page 1 of 1</span>
                <a th:if="${page < totalPages}" th:href="@{/logs(page=${page + 1})}"
                   class="px-3 py-1 text-xs border border-zinc-800 rounded hover:bg-zinc-800 cursor-pointer">Next</a>
            </nav>
        </th:block>
    </div>
</th:block>
</html>
