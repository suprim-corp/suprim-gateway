server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:${DATABASE_PATH:./data/gateway.db}
    driver-class-name: org.sqlite.JDBC
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
  thymeleaf:
    cache: false

logging:
  level:
    dev.suprim.gateway: ${LOG_LEVEL:info}
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p){highlight} %clr([%X{requestId:-}]){cyan} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){blue} %clr(:){faint} %m%n"

suprim:
  admin-api-key: ${ADMIN_API_KEY:admin}
  creds-file: ${KIRO_CREDS_FILE:}
  refresh-token: ${REFRESH_TOKEN:}
  cli-db-file: ${KIRO_CLI_DB_FILE:}
  profile-arn: ${PROFILE_ARN:}
  region: ${KIRO_REGION:us-east-1}
  api-region: ${KIRO_API_REGION:}
  proxy-file: ${PROXY_FILE:data/proxies.json}
  first-token-timeout: ${FIRST_TOKEN_TIMEOUT:15}
  streaming-read-timeout: ${STREAMING_READ_TIMEOUT:300}
  first-token-max-retries: ${FIRST_TOKEN_MAX_RETRIES:3}
  disabled-models: ${DISABLED_MODELS:}
