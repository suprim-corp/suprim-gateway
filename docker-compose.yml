services:
  gateway:
    container_name: kiro-gateway
    build: .
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file: .env
    environment:
      DATABASE_PATH: /app/data/gateway.db
      KIRO_CREDS_FILE: /app/creds/kiro-auth-token.json
    volumes:
      - ./data:/app/data
      - ${KIRO_CREDS_HOST_PATH:-${HOME}/.aws/sso/cache}:/app/creds
    restart: unless-stopped
